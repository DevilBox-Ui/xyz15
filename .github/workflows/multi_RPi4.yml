name: Multi RPi4 Dual

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      rootfs_size:
        description: RootFS size in MB
        default: "2048"
        required: true

      version:
        description: Select firmware version
        required: true
        default: snapshots
        type: choice
        options:
          - 24.10.5
          - 24.10.6
          - 25.12.0
          - 25.12.1
          - snapshots
          - immortalwrt-25.12.0-rc1

      flavor:
        description: Select firmware flavor
        required: true
        default: openwrt
        type: choice
        options:
          - openwrt
          - immortalwrt

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential zstd wget tar

      - name: Prepare ImageBuilder
        run: |
          VERSION="${{ github.event.inputs.version }}"
          FLAVOR="${{ github.event.inputs.flavor }}"

          if [ "$FLAVOR" = "immortalwrt" ]; then
            FILE_NAME="immortalwrt-imagebuilder-25.12.0-rc1-bcm27xx-bcm2711.Linux-x86_64"
            IB_URL="https://immortalwrt.kyarucloud.moe/releases/25.12.0-rc1/targets/bcm27xx/bcm2711/${FILE_NAME}.tar.zst"
          else
            if [ "$VERSION" = "snapshots" ]; then
              FILE_NAME="openwrt-imagebuilder-bcm27xx-bcm2711.Linux-x86_64"
              IB_URL="https://downloads.openwrt.org/snapshots/targets/bcm27xx/bcm2711/${FILE_NAME}.tar.zst"
            else
              FILE_NAME="openwrt-imagebuilder-${VERSION}-bcm27xx-bcm2711.Linux-x86_64"
              IB_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/bcm27xx/bcm2711/${FILE_NAME}.tar.zst"
            fi
          fi

          wget $IB_URL
          tar --zstd -xf ${FILE_NAME}.tar.zst

          IB_NAME=$(find . -maxdepth 1 -type d -name "*imagebuilder*" | head -n1 | sed 's|./||')

          echo "IB_NAME=$IB_NAME" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "FLAVOR=$FLAVOR" >> $GITHUB_ENV

      - name: Make uci-defaults executable
        run: chmod +x files/etc/uci-defaults/* 2>/dev/null || true

      - name: Patch OPENWRT_RELEASE
        run: |
          if [ "$FLAVOR" = "immortalwrt" ]; then
            LABEL="ImmortalWrt $VERSION by Yogxx"
          else
            LABEL="OpenWrt $VERSION by Yogxx"
          fi

          FILE=$(find $IB_NAME -name os-release | head -n1)

          sed -i "s|^OPENWRT_RELEASE=.*|OPENWRT_RELEASE=\"$LABEL\"|" "$FILE"

      - name: Inject Packages
        run: |
          PKG_EXT="apk"

          if [[ "$VERSION" == 24.10.* ]]; then
            PKG_EXT="ipk"
          fi

          wget -O luci-app-openclash.$PKG_EXT \
          https://github.com/Yogxx/OpenClash/releases/download/v0.47.075/luci-app-openclash_0.47.075_all.$PKG_EXT

          wget -O luci-app-tinyfm.$PKG_EXT \
          https://github.com/Yogxx/tinyfm-snapshot/releases/download/v2.5.3-8/luci-app-tinyfm_2.5.3-r8_all.$PKG_EXT

          wget -O luci-app-3ginfo-lite.$PKG_EXT \
          https://github.com/4IceG/luci-app-3ginfo-lite/releases/download/1.0.77-r20260215/luci-app-3ginfo-lite_1.0.77_all.$PKG_EXT

          wget -O luci-app-sms-tool-js.$PKG_EXT \
          https://github.com/4IceG/luci-app-sms-tool-js/releases/download/2.0.38-r20260222/luci-app-sms-tool-js_2.0.38_all.$PKG_EXT

          cp *.$PKG_EXT $IB_NAME/packages/
          cp custom-packages/*.$PKG_EXT $IB_NAME/packages/ 2>/dev/null || true

          if [ "$PKG_EXT" = "ipk" ]; then
            wget -O nikki.tar.gz \
            https://github.com/Yogxx/OpenWrt-nikkiku/releases/download/v1.25.2/nikki_aarch64_cortex-a72-openwrt-24.10.tar.gz
          else
            wget -O nikki.tar.gz \
            https://github.com/Yogxx/OpenWrt-nikkiku/releases/download/v1.25.2/nikki_aarch64_cortex-a72-openwrt-25.12.tar.gz
          fi

          tar -xzf nikki.tar.gz
          cp nikki*.$PKG_EXT $IB_NAME/packages/
          cp luci-app-nikki*.$PKG_EXT $IB_NAME/packages/

      - name: Remove Login Banners
        run: |
          mkdir -p files/etc/profile.d

          cat > files/etc/profile.d/00-passwordless-root.sh << 'EOF'
          if grep -Esq '^root::' /etc/shadow ; then
          fi
          EOF

          cat > files/etc/profile.d/apk-cheatsheet.sh << 'EOF'
          if [ -x /usr/bin/apk ] ; then
          fi
          EOF

      - name: Build Firmware
        run: |
          cd $IB_NAME

          make image \
            PROFILE="rpi-4" \
            ROOTFS_PARTSIZE=${{ github.event.inputs.rootfs_size }} \
            KERNEL_PARTSIZE=128 \
            PACKAGES="\
            -dnsmasq -wget-nossl -libustream-mbedtls \
            dnsmasq-full libiwinfo-data liblua lua liblucihttp liblucihttp-lua libubus-lua libuci-lua luci-base luci-compat luci-lua-runtime \
            luci-lib-base luci-lib-ip luci-lib-jsonc luci-lib-nixio luci-mod-admin-full luci-mod-network luci-mod-status luci-mod-system \
            luci-theme-material \
            luci-app-firewall luci-app-package-manager \
            rpcd rpcd-mod-file rpcd-mod-luci rpcd-mod-rrdns uhttpd uhttpd-mod-ubus \
            kmod-mii kmod-usb-core kmod-usb-net kmod-usb-net-rtl8150 kmod-usb-net-rtl8152 kmod-usb-net-asix kmod-usb-net-asix-ax88179 \
            kmod-usb-net-rndis kmod-usb-net-cdc-ncm kmod-usb-net-huawei-cdc-ncm kmod-usb-net-cdc-ether kmod-usb-net-qmi-wwan kmod-usb-net-sierrawireless \
            kmod-usb-serial kmod-usb-serial-sierrawireless kmod-usb-serial-qualcomm kmod-usb-serial-wwan kmod-usb-serial-option kmod-usb-acm usbutils \
            kmod-tun kmod-nft-tproxy kmod-nft-socket kmod-inet-diag kmod-netlink-diag \
            libustream-openssl ip-full ca-bundle \
            coreutils coreutils-base64 coreutils-nohup coreutils-stat \
            lsblk blkid parted e2fsprogs btrfs-progs \
            bash nano curl wget-ssl htop tcpdump ethtool lsof iperf3 bzip2 unzip openssh-sftp-server ttyd luci-app-ttyd usbutils adb \
            umbim uqmi qmi-utils mbim-utils modemmanager luci-proto-modemmanager chat comgt sms-tool \
            sing-box \
            php8 php8-cgi php8-fpm php8-fastcgi php8-mod-session php8-mod-ctype php8-mod-fileinfo \
            php8-mod-zip php8-mod-iconv php8-mod-mbstring zoneinfo-core zoneinfo-asia \
            ruby ruby-yaml ruby-psych ruby-stringio ruby-pstore ruby-enc ruby-digest ruby-date ruby-bigdecimal \
            luci-app-3ginfo-lite luci-app-sms-tool-js luci-app-tinyfm luci-app-openclash nikki luci-app-nikki \
            tar jq yq vnstat2 luci-app-vnstat2" \
            FILES="../files"

      - name: Upload Firmware
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}-${{ github.event.inputs.flavor }}-${{ github.run_number }}
          name: "${{ github.event.inputs.flavor == 'immortalwrt' && 'ImmortalWrt' || 'OpenWrt' }} ${{ github.event.inputs.version }} Build ${{ github.run_number }}"
          files: |
            ${{ env.IB_NAME }}/bin/targets/bcm27xx/bcm2711/*ext4-factory.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
