name: OpenWrt RPi4

on:
  workflow_dispatch:
    inputs:
      rootfs_size:
        description: "RootFS size in MB"
        default: "1024"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Make all uci-defaults executable
        run: chmod +x files/etc/uci-defaults/*

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential zstd wget

      - name: Download ImageBuilder
        run: |
          wget https://downloads.openwrt.org/releases/24.10.5/targets/bcm27xx/bcm2711/openwrt-imagebuilder-24.10.5-bcm27xx-bcm2711.Linux-x86_64.tar.zst
          tar --zstd -xf openwrt-imagebuilder-24.10.5-bcm27xx-bcm2711.Linux-x86_64.tar.zst

      - name: Custom IPK
        run: |
          wget -O luci-app-openclash.ipk "https://github.com/Yogxx/OpenClash/releases/download/v0.47.055/luci-app-openclash_0.47.055_all.ipk"
          cp luci-app-openclash.ipk openwrt-imagebuilder-*/packages/

      - name: Build Firmware
        run: |
          cd openwrt-imagebuilder-24.10.5-bcm27xx-bcm2711.Linux-x86_64
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=${{ github.event.inputs.rootfs_size }}" >> .config

          make image \
            PROFILE="rpi-4" \
            PACKAGES="\
            -dnsmasq -wget-nossl -libustream-mbedtls \
            \
            dnsmasq-full libiwinfo-data liblua lua liblucihttp liblucihttp-lua libubus-lua libuci-lua luci luci-light luci-base luci-compat luci-lua-runtime \
            luci-lib-base luci-lib-ip luci-lib-jsonc luci-lib-nixio luci-mod-admin-full luci-mod-network luci-mod-status luci-mod-system \
            luci-theme-bootstrap luci-theme-material \
            luci-app-firewall luci-app-package-manager \
            rpcd rpcd-mod-file rpcd-mod-luci rpcd-mod-rrdns uhttpd uhttpd-mod-ubus \
            kmod-mii kmod-usb-core kmod-usb-net kmod-usb-net-rtl8150 kmod-usb-net-rtl8152 kmod-usb-net-asix kmod-usb-net-asix-ax88179 \
            kmod-usb-net-rndis kmod-usb-net-cdc-ncm kmod-usb-net-huawei-cdc-ncm kmod-usb-net-cdc-ether kmod-usb-net-qmi-wwan kmod-usb-net-sierrawireless \
            kmod-usb-serial kmod-usb-serial-sierrawireless kmod-usb-serial-qualcomm kmod-usb-serial-wwan kmod-usb-serial-option kmod-usb-acm usbutils \
            kmod-tun kmod-nft-tproxy kmod-nft-socket kmod-inet-diag kmod-netlink-diag \
            \
            openssl-util libopenssl-conf libustream-openssl ca-bundle \
            coreutils coreutils-base64 coreutils-nohup coreutils-stat \
            lsblk blkid parted e2fsprogs btrfs-progs \
            \
            bash nano curl wget-ssl htop tcpdump ethtool lsof iperf3 bzip2 unzip openssh-sftp-server ttyd luci-app-ttyd usbutils adb \
            \
            kmod-usb-core kmod-usb-acm kmod-usb-net kmod-usb-serial \
            kmod-usb-serial-option kmod-usb-serial-qualcomm kmod-usb-serial-sierrawireless kmod-usb-net-cdc-ether kmod-usb-net-cdc-ncm kmod-usb-net-cdc-mbim \
            kmod-usb-net-qmi-wwan kmod-usb-net-rndis kmod-usb-net-asix kmod-usb-net-asix-ax88179 kmod-usb-net-rtl8150 kmod-usb-net-rtl8152 kmod-nls-utf8 \
            \
            uqmi umbim qmi-utils mbim-utils modemmanager luci-proto-modemmanager chat comgt sms-tool \
            \
            ip-full kmod-inet-diag kmod-nft-socket kmod-nft-tproxy kmod-tun \
            \
            microsocks xray-core sing-box v2ray-geosite v2ray-geoip \
            \
            php8 php8-cgi php8-fpm php8-fastcgi php8-mod-session php8-mod-ctype php8-mod-fileinfo \
            php8-mod-zip php8-mod-iconv php8-mod-mbstring zoneinfo-core zoneinfo-asia \
            \
            ruby ruby-yaml ruby-psych ruby-stringio ruby-pstore ruby-enc ruby-digest ruby-date ruby-bigdecimal \
            \
            luci-app-openclash \
            \
            jq yq vnstat2 luci-app-vnstat2" \
            FILES="../files"

      - uses: actions/upload-artifact@v4
        with:
          name: openwrt-custom
          path: openwrt-imagebuilder-*/bin/targets/
          
