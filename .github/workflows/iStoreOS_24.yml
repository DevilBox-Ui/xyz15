name: iStoreOS RPI4

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      rootfs_size:
        description: "RootFS size in MB"
        default: "1024"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential zstd wget tar

      - name: Set ImageBuilder Variables
        run: |
          IB_NAME="istoreos-imagebuilder-bcm27xx-bcm2711.Linux-x86_64"
          IB_URL="https://fw0.koolcenter.com/iStoreOS/ib/bcm2711/${IB_NAME}.tar.zst"

          echo "IB_NAME=$IB_NAME" >> $GITHUB_ENV
          echo "IB_URL=$IB_URL" >> $GITHUB_ENV

      - name: Download ImageBuilder
        run: |
          wget $IB_URL
          tar --zstd -xf ${IB_NAME}.tar.zst

      - name: Make uci-defaults executable
        run: chmod +x files/etc/uci-defaults/* 2>/dev/null || true

      - name: Inject Custom Packages
        run: |
          cp custom-packages/* $IB_NAME/packages/ 2>/dev/null || true

      - name: Build Firmware
        run: |
          cd $IB_NAME
          make image \
            PROFILE="rpi-4" \
            ROOTFS_PARTSIZE=${{ github.event.inputs.rootfs_size }} \
            PACKAGES="\
            -dnsmasq -wget-nossl -libustream-mbedtls -default-settings-chn -luci-i18n-base-zh-cn -luci-app-rclone_INCLUDE_rclone-webui -luci-app-rclone_INCLUDE_rclone-ng \
            dnsmasq-full luci luci-base luci-compat luci-lib-nixio luci-lib-ip luci-lua-runtime luci-light libuci-lua \
            luci-mod-admin-full luci-mod-network luci-mod-status rpcd-mod-luci luci-lib-jsonc \
            luci-theme-bootstrap luci-theme-material \
            luci-app-firewall luci-app-package-manager \
            kmod-mii kmod-usb-core kmod-usb-net kmod-usb-net-rtl8150 kmod-usb-net-rtl8152 kmod-usb-net-asix kmod-usb-net-asix-ax88179 \
            kmod-usb-net-rndis kmod-usb-net-cdc-ncm kmod-usb-net-huawei-cdc-ncm kmod-usb-net-cdc-ether kmod-usb-net-qmi-wwan kmod-usb-net-sierrawireless \
            kmod-usb-serial kmod-usb-serial-sierrawireless kmod-usb-serial-qualcomm kmod-usb-serial-wwan kmod-usb-serial-option kmod-usb-acm usbutils \
            kmod-tun kmod-nft-tproxy kmod-nft-socket kmod-inet-diag kmod-netlink-diag \
            openssl-util libopenssl-conf libustream-openssl ca-bundle \
            coreutils coreutils-base64 coreutils-nohup coreutils-stat \
            lsblk blkid parted e2fsprogs btrfs-progs ip-full \
            bash nano curl wget-ssl htop tcpdump ethtool lsof iperf3 bzip2 unzip openssh-sftp-server ttyd luci-app-ttyd adb \
            uqmi umbim qmi-utils mbim-utils modemmanager luci-proto-modemmanager chat comgt sms-tool \
            microsocks xray-core sing-box v2ray-geosite v2ray-geoip \
            php8 php8-cgi php8-fpm php8-fastcgi php8-mod-session php8-mod-ctype php8-mod-fileinfo \
            php8-mod-zip php8-mod-iconv php8-mod-mbstring zoneinfo-core zoneinfo-asia \
            ruby ruby-yaml ruby-psych ruby-stringio ruby-pstore ruby-enc ruby-digest ruby-date ruby-bigdecimal \
            luci-app-tinyfm luci-app-openclash \
            jq yq vnstat2 luci-app-vnstat2" \
            FILES="../files"

      - name: Upload Firmware to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: istoreos-${{ github.run_number }}
          name: iStoreOS RPI4 Build ${{ github.run_number }}
          files: |
            ${{ env.IB_NAME }}/bin/targets/bcm27xx/bcm2711/*.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
