name: OpenWrt RPi4 Dual

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      rootfs_size:
        description: "RootFS size in MB"
        default: "1024"
        required: true
      version:
        description: "Select OpenWrt version"
        required: true
        default: "snapshots"
        type: choice
        options:
          - "24.10.5"
          - "24.10.6"
          - "25.12.0"
          - "25.12.1"
          - "25.12.2"
          - "snapshots"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential zstd wget tar

      - name: Set ImageBuilder Variables
        run: |
          VERSION="${{ github.event.inputs.version }}"

          if [ "$VERSION" = "snapshots" ]; then
            IB_NAME="openwrt-imagebuilder-bcm27xx-bcm2711.Linux-x86_64"
            IB_URL="https://downloads.openwrt.org/snapshots/targets/bcm27xx/bcm2711/${IB_NAME}.tar.zst"
          else
            IB_NAME="openwrt-imagebuilder-${VERSION}-bcm27xx-bcm2711.Linux-x86_64"
            IB_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/bcm27xx/bcm2711/${IB_NAME}.tar.zst"
          fi

          echo "IB_NAME=$IB_NAME" >> $GITHUB_ENV
          echo "IB_URL=$IB_URL" >> $GITHUB_ENV

      - name: Download ImageBuilder
        run: |
          wget $IB_URL
          tar --zstd -xf ${IB_NAME}.tar.zst

      - name: Make uci-defaults executable
        run: chmod +x files/etc/uci-defaults/* 2>/dev/null || true

      # ===== Version Specific Injection =====

      - name: Inject Extra Packages (24.10 only)
        if: github.event.inputs.version == '24.10.5' || github.event.inputs.version == '24.10.6'
        run: |
          wget -O luci-app-openclash_047.075_all.ipk \
          https://github.com/Yogxx/OpenClash/releases/download/v0.47.075/luci-app-openclash_0.47.075_all.ipk

          wget -O luci-app-tinyfm_2.5.3-r9_all.ipk \
          https://github.com/Yogxx/tinyfm-snapshot/releases/download/v2.5.3-9/luci-app-tinyfm_2.5.3-r9_all.ipk

          wget -O luci-app-3ginfo-lite_1.0.77_all.ipk \
          https://github.com/4IceG/luci-app-3ginfo-lite/releases/download/1.0.77-r20260215/luci-app-3ginfo-lite_1.0.77_all.ipk

          wget -O luci-app-sms-tool-js_2.0.38_all.ipk \
          https://github.com/4IceG/luci-app-sms-tool-js/releases/download/2.0.38-r20260222/luci-app-sms-tool-js_2.0.38_all.ipk

          wget -O bandix_0.12.7-r1_aarch64_cortex-a72.ipk \
          https://github.com/timsaya/openwrt-bandix/releases/download/v0.12.7/bandix_0.12.7-r1_aarch64_cortex-a72.ipk
          
          wget -O luci-app-bandix_0.12.6-r1_all.ipk \
          https://github.com/timsaya/luci-app-bandix/releases/download/v0.12.6/luci-app-bandix_0.12.6-r1_all.ipk

          cp *.ipk $IB_NAME/packages/
          cp custom-packages/*.ipk $IB_NAME/packages/ 2>/dev/null || true

          # Download & ekstrak nikki
          wget -O nikki.tar.gz \
          https://github.com/Yogxx/OpenWrt-nikkiku/releases/download/v1.25.3/nikki_aarch64_cortex-a72-openwrt-24.10.tar.gz
          tar -xzf nikki.tar.gz
          
          # Copy hanya nikki & luci-app-nikki IPK saja
          cp nikki*.ipk $IB_NAME/packages/
          cp luci-app-nikki*.ipk $IB_NAME/packages/

      - name: Inject Extra Packages & Custom APKs (25.12 / snapshots only)
        if: 
          github.event.inputs.version == '25.12.0' ||
          github.event.inputs.version == '25.12.1' ||
          github.event.inputs.version == '25.12.2' ||
          github.event.inputs.version == 'snapshots'
        run: |
          wget -O luci-app-openclash-0.47.075.apk \
          https://github.com/Yogxx/OpenClash/releases/download/v0.47.075/luci-app-openclash-0.47.075.apk
          
          wget -O luci-app-tinyfm-2.5.3-r9.apk \
          https://github.com/Yogxx/tinyfm-snapshot/releases/download/v2.5.3-9/luci-app-tinyfm-2.5.3-r9.apk

          wget -O luci-app-3ginfo-lite-1.0.77-r20260215.apk \
          https://github.com/4IceG/luci-app-3ginfo-lite/releases/download/1.0.77-r20260215/luci-app-3ginfo-lite-1.0.77-r20260215.apk

          wget -O luci-app-sms-tool-js-2.0.38-r20260222.apk \
          https://github.com/4IceG/luci-app-sms-tool-js/releases/download/2.0.38-r20260222/luci-app-sms-tool-js-2.0.38-r20260222.apk
          
          cp *.apk $IB_NAME/packages/
          cp custom-packages/*.apk $IB_NAME/packages/ 2>/dev/null || true

          # Download & ekstrak nikki
          wget -O nikki.tar.gz \
          https://github.com/Yogxx/OpenWrt-nikkiku/releases/download/v1.25.3/nikki_aarch64_cortex-a72-openwrt-25.12.tar.gz
          tar -xzf nikki.tar.gz
          
          # Copy hanya nikki & luci-app-nikki APK saja
          cp nikki*.apk $IB_NAME/packages/
          cp luci-app-nikki*.apk $IB_NAME/packages/
    

      - name: Remove Login Banners (25.12 only)
        if: 
          github.event.inputs.version == '25.12.0' ||
          github.event.inputs.version == '25.12.1' ||
          github.event.inputs.version == '25.12.2' ||
          github.event.inputs.version == 'snapshots'
        run: |
          mkdir -p files/etc/profile.d
          > files/etc/profile.d/00-passwordless-root.sh
          > files/etc/profile.d/apk-cheatsheet.sh

      - name: Build Firmware
        run: |
          cd $IB_NAME
          make image \
            PROFILE="rpi-4" \
            ROOTFS_PARTSIZE=${{ github.event.inputs.rootfs_size }} \
            KERNEL_PARTSIZE=128 \
            PACKAGES="\
            -dnsmasq -wget-nossl -libustream-mbedtls \
            dnsmasq-full libiwinfo-data liblua lua liblucihttp liblucihttp-lua libubus-lua libuci-lua luci-base luci-compat luci-lua-runtime \
            luci-lib-base luci-lib-ip luci-lib-jsonc luci-lib-nixio luci-mod-admin-full luci-mod-network luci-mod-status luci-mod-system \
            luci-theme-material \
            luci-app-firewall luci-app-package-manager \
            rpcd rpcd-mod-file rpcd-mod-luci rpcd-mod-rrdns uhttpd uhttpd-mod-ubus \
            kmod-mii kmod-usb-core kmod-usb-net kmod-usb-net-rtl8150 kmod-usb-net-rtl8152 kmod-usb-net-asix kmod-usb-net-asix-ax88179 \
            kmod-usb-net-rndis kmod-usb-net-cdc-ncm kmod-usb-net-huawei-cdc-ncm kmod-usb-net-cdc-ether kmod-usb-net-qmi-wwan kmod-usb-net-sierrawireless \
            kmod-usb-serial kmod-usb-serial-sierrawireless kmod-usb-serial-qualcomm kmod-usb-serial-wwan kmod-usb-serial-option kmod-usb-acm usbutils \
            kmod-tun kmod-nft-tproxy kmod-nft-socket kmod-inet-diag kmod-netlink-diag \
            libustream-openssl ip-full ca-bundle \
            coreutils coreutils-base64 coreutils-nohup coreutils-stat \
            lsblk blkid parted e2fsprogs btrfs-progs \
            bash nano curl wget-ssl htop tcpdump ethtool lsof iperf3 bzip2 unzip openssh-sftp-server ttyd luci-app-ttyd usbutils adb \
            umbim uqmi qmi-utils mbim-utils modemmanager luci-proto-modemmanager chat comgt sms-tool \
            sing-box \
            php8 php8-cgi php8-fpm php8-fastcgi php8-mod-session php8-mod-ctype php8-mod-fileinfo \
            php8-mod-zip php8-mod-iconv php8-mod-mbstring zoneinfo-core zoneinfo-asia \
            ruby ruby-yaml ruby-psych ruby-stringio ruby-enc \
            luci-app-3ginfo-lite luci-app-sms-tool-js luci-app-tinyfm luci-app-openclash nikki luci-app-nikki \
            tar jq yq vnstat2 luci-app-vnstat2" \
            FILES="../files"

      - name: Upload Firmware to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}-${{ github.run_number }}
          name: OpenWrt ${{ github.event.inputs.version }} Build ${{ github.run_number }}
          files: |
            ${{ env.IB_NAME }}/bin/targets/bcm27xx/bcm2711/*ext4-factory.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
